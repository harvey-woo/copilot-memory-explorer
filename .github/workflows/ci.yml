name: Build VSIX

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Package VSIX
        run: npx vsce package --out copilot-memory-explorer.vsix

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Creating release: $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See [CHANGELOG](https://github.com/harvey-woo/copilot-memory-explorer/blob/main/CHANGELOG.md) for details." \
            --target "${{ github.sha }}" \
            copilot-memory-explorer.vsix 2>&1 || \
          gh release upload "$TAG" copilot-memory-explorer.vsix --clobber 2>&1
